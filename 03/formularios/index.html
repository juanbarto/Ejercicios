<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Formulario</title>
</head>

<body>

   <h1>Ejemplo de Formulario básico en HTML</h1>
   <!--

      <br>

      <label for="last-name">Apellido</label>

   </form>

   <form action="https://formspree.io/f/mnnprpvr" method="POST">

      <!-- <label for="nombre">Nombre</label> -->
      <input  type="text" id="nombre" name="name" required placeholder="Ingrese su nombre" maxlength="5" minlength="3">

      <br>
      <input type="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" id="email" name="email" required
         placeholder="Ingrese su email" title="Formato de email incorrecto">
      <br>
      <fieldset>
         <legend>Género</legend>
         <label for="hombre">Hombre</label>
         <input type="radio" id="hombre" name="genero" value="hombre">

         <label for="mujer">Mujer</label>
         <input type="radio" id="mujer" name="genero" value="mujer">

         <label for="otro">Otro</label>
         <input type="radio" id="otro" name="genero" value="otro">
      </fieldset>

      <fieldset>
         <legend>Intereses</legend>
         <label for="html">HTML</label>
         <input type="checkbox" id="html" name="html" value="HTML">

         <label for="css">CSS</label>
         <input type="checkbox" id="css" name="css" value="CSS">

         <label for="js">JavaScript</label>
         <input type="checkbox" id="js" name="javas" value="JavaScript">
      </fieldset>

      <label for="pais">País</label>
      <select name="pais" id="pais">

         <option value="ar">Argentina</option>
         <option value="mx">México</option>
         <option value="es">España</option>

      </select>

      <br><br>
      <label for="archivo"></label>
      <input type="file" accept=".jpg, .png, .pdf" name="archivo" id="archivo">

      <br>
      <textarea name="" id="" ></textarea>
      <br>
      <!-- <button type="submit">Enviar</button> -->
      <input type="submit" value="Cargar Datos">
      <input type="reset" value="Limpiar">
   </form>

</body>

</html>
