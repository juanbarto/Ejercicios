<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio - 1 y 2: Formulario y envío a formspree</title>
</head>
<body>
    <header>
        <h1>Ejercicio - 1 y 2: Crear un Formulario de Contacto + Envío de la información</h1>
    </header>
    <main>
        <p>Formulario controlado:</p>
        <form action="https://formspree.io/f/mqapnjng" method="POST">
            <input type="text" name="nombre" id="nombre" placeholder="Nombre">
            <input type="email" name="email" id="email" placeholder="Correo electrónico">
            <textarea name="area de texto" id="area de texto" rows="10" cols="60" placeholder="Observaciones"></textarea>
            <button type="submit">Enviar</button>
        </form>
    </main>
</body>
</html>
